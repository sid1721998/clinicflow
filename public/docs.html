<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <title>ClinicFlow API Dokumentacija</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    body { margin: 0; background: #fafafa; }
    .topbar { background: #0d9488 !important; }
    .topbar-wrapper img { display: none; }
    .topbar-wrapper::after { content: "ClinicFlow API"; color: white; font-size: 1.4rem; font-weight: 700; padding: 0 20px; }
    .info .title { color: #0d9488; }
  </style>
</head>
<body>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
const spec = {
  openapi: "3.0.3",
  info: { title: "ClinicFlow API", version: "1.0.0", description: "Enterprise SaaS REST API za privatne poliklinike u Hrvatskoj.\n\n**Demo pristup:**\n- Email: admin@demo-klinika.hr\n- Lozinka: demo1234" },
  servers: [{ url: "/api", description: "ClinicFlow API" }],
  components: {
    securitySchemes: { bearerAuth: { type: "http", scheme: "bearer", bearerFormat: "JWT" } }
  },
  security: [{ bearerAuth: [] }],
  paths: {
    "/register": { post: { tags: ["Autentifikacija"], summary: "Registracija nove klinike", security: [], requestBody: { required: true, content: { "application/json": { schema: { type: "object", required: ["clinic_name","first_name","last_name","email","password"], properties: { clinic_name: { type: "string", example: "Moja Klinika Zagreb" }, first_name: { type: "string", example: "Ana" }, last_name: { type: "string", example: "Novak" }, email: { type: "string", example: "ana@klinika.hr" }, password: { type: "string", example: "tajna1234" }, password_confirmation: { type: "string", example: "tajna1234" } } } } } }, responses: { "201": { description: "Klinika kreirana" } } } },
    "/login": { post: { tags: ["Autentifikacija"], summary: "Prijava korisnika", security: [], requestBody: { required: true, content: { "application/json": { schema: { type: "object", required: ["email","password"], properties: { email: { type: "string", example: "admin@demo-klinika.hr" }, password: { type: "string", example: "demo1234" } } } } } }, responses: { "200": { description: "Bearer token" }, "401": { description: "Neispravni podaci" } } } },
    "/logout": { post: { tags: ["Autentifikacija"], summary: "Odjava", responses: { "200": { description: "OK" } } } },
    "/me": { get: { tags: ["Autentifikacija"], summary: "Profil korisnika", responses: { "200": { description: "Podaci o korisniku" } } } },
    "/dashboard": { get: { tags: ["Dashboard"], summary: "Statistike klinike", responses: { "200": { description: "Metrike klinike" } } } },
    "/patients": { get: { tags: ["Pacijenti"], summary: "Lista pacijenata", parameters: [{ name: "filter[search]", in: "query", schema: { type: "string" } }, { name: "sort", in: "query", schema: { type: "string", example: "-created_at" } }], responses: { "200": { description: "Lista pacijenata" } } }, post: { tags: ["Pacijenti"], summary: "Kreiranje pacijenta", requestBody: { required: true, content: { "application/json": { schema: { type: "object", required: ["first_name","last_name","dob","gender"], properties: { first_name: { type: "string" }, last_name: { type: "string" }, dob: { type: "string", format: "date", example: "1990-03-15" }, gender: { type: "string", enum: ["male","female","other"] }, phone: { type: "string" }, email: { type: "string" }, blood_type: { type: "string", example: "A+" } } } } } }, responses: { "201": { description: "Pacijent kreiran" } } } },
    "/patients/{id}": { get: { tags: ["Pacijenti"], summary: "Detalji pacijenta", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "Pacijent" } } }, put: { tags: ["Pacijenti"], summary: "Ažuriranje pacijenta", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], requestBody: { content: { "application/json": { schema: { type: "object" } } } }, responses: { "200": { description: "Ažurirano" } } }, delete: { tags: ["Pacijenti"], summary: "Brisanje pacijenta", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "Obrisano" } } } },
    "/patients/{id}/timeline": { get: { tags: ["Pacijenti"], summary: "Timeline pacijenta", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "Timeline" } } } },
    "/doctors": { get: { tags: ["Doktori"], summary: "Lista doktora", responses: { "200": { description: "Lista" } } }, post: { tags: ["Doktori"], summary: "Kreiranje doktora", requestBody: { content: { "application/json": { schema: { type: "object", required: ["user_id","license_number"], properties: { user_id: { type: "integer" }, specialization_id: { type: "integer" }, license_number: { type: "string", example: "HR-MED-12345" }, consultation_duration: { type: "integer", example: 30 }, price: { type: "number", example: 80.00 } } } } } }, responses: { "201": { description: "Kreiran" } } } },
    "/doctors/{id}/availability": { get: { tags: ["Doktori"], summary: "Slobodni termini", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }, { name: "date", in: "query", required: true, schema: { type: "string", format: "date", example: "2026-08-01" } }], responses: { "200": { description: "Slobodni termini" } } } },
    "/appointments": { get: { tags: ["Termini"], summary: "Lista termina", parameters: [{ name: "filter[status]", in: "query", schema: { type: "string" } }, { name: "filter[doctor_id]", in: "query", schema: { type: "integer" } }], responses: { "200": { description: "Lista" } } }, post: { tags: ["Termini"], summary: "Zakazivanje termina", requestBody: { required: true, content: { "application/json": { schema: { type: "object", required: ["patient_id","doctor_id","starts_at","type"], properties: { patient_id: { type: "integer" }, doctor_id: { type: "integer" }, starts_at: { type: "string", format: "date-time", example: "2026-08-01T10:00:00" }, type: { type: "string", enum: ["consultation","follow_up","procedure","emergency","checkup","telemedicine"] }, chief_complaint: { type: "string" } } } } } }, responses: { "201": { description: "Zakazan" } } } },
    "/appointments/today": { get: { tags: ["Termini"], summary: "Termini za danas", responses: { "200": { description: "Današnji termini" } } } },
    "/appointments/calendar": { get: { tags: ["Termini"], summary: "Kalendar termina", parameters: [{ name: "from", in: "query", schema: { type: "string", format: "date" } }, { name: "to", in: "query", schema: { type: "string", format: "date" } }], responses: { "200": { description: "Termini" } } } },
    "/appointments/{id}": { get: { tags: ["Termini"], summary: "Detalji termina", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "Termin" } } }, put: { tags: ["Termini"], summary: "Ažuriranje termina", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], requestBody: { content: { "application/json": { schema: { type: "object", properties: { status: { type: "string", enum: ["scheduled","confirmed","in_progress","completed","cancelled","no_show"] } } } } } }, responses: { "200": { description: "Ažurirano" } } }, delete: { tags: ["Termini"], summary: "Otkazivanje", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "Otkazano" } } } },
    "/medical-records": { get: { tags: ["Medicinski kartoni"], summary: "Lista kartona", responses: { "200": { description: "Lista" } } }, post: { tags: ["Medicinski kartoni"], summary: "Kreiranje kartona", requestBody: { content: { "application/json": { schema: { type: "object", required: ["appointment_id","subjective"], properties: { appointment_id: { type: "integer" }, subjective: { type: "string" }, objective: { type: "string" }, assessment: { type: "string" }, plan: { type: "string" }, icd_codes: { type: "array", items: { type: "string" }, example: ["M54.5"] } } } } } }, responses: { "201": { description: "Kreiran" } } } },
    "/medical-records/{id}/sign": { post: { tags: ["Medicinski kartoni"], summary: "Digitalni potpis", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "Potpisan" } } } },
    "/prescriptions": { get: { tags: ["Recepti"], summary: "Lista recepata", responses: { "200": { description: "Lista" } } }, post: { tags: ["Recepti"], summary: "Kreiranje recepta", requestBody: { content: { "application/json": { schema: { type: "object", required: ["appointment_id","items"], properties: { appointment_id: { type: "integer" }, valid_until: { type: "string", format: "date" }, items: { type: "array", items: { type: "object", properties: { medication_name: { type: "string", example: "Ibuprofen 400mg" }, dosage: { type: "string", example: "400mg" }, frequency: { type: "string", example: "3x dnevno" }, duration_days: { type: "integer", example: 7 } } } } } } } } }, responses: { "201": { description: "Kreiran" } } } },
    "/prescriptions/{id}/pdf": { get: { tags: ["Recepti"], summary: "PDF recepta", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "PDF", content: { "application/pdf": { schema: { type: "string", format: "binary" } } } } } } },
    "/invoices": { get: { tags: ["Fakture"], summary: "Lista faktura", responses: { "200": { description: "Lista" } } }, post: { tags: ["Fakture"], summary: "Kreiranje fakture", requestBody: { required: true, content: { "application/json": { schema: { type: "object", required: ["patient_id","line_items"], properties: { patient_id: { type: "integer" }, appointment_id: { type: "integer" }, currency: { type: "string", enum: ["EUR","HRK","USD"], example: "EUR" }, tax_rate: { type: "number", example: 25 }, line_items: { type: "array", items: { type: "object", properties: { description: { type: "string", example: "Konzultacija" }, quantity: { type: "integer", example: 1 }, unit_price: { type: "number", example: 80.00 } } } } } } } } }, responses: { "201": { description: "Kreirana" } } } },
    "/invoices/summary": { get: { tags: ["Fakture"], summary: "Sumarni pregled", responses: { "200": { description: "Statistike" } } } },
    "/invoices/{id}": { get: { tags: ["Fakture"], summary: "Detalji fakture", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "Faktura" } } }, put: { tags: ["Fakture"], summary: "Ažuriranje", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "OK" } } }, delete: { tags: ["Fakture"], summary: "Brisanje", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "OK" } } } },
    "/invoices/{id}/mark-paid": { post: { tags: ["Fakture"], summary: "Označi kao plaćeno", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], requestBody: { content: { "application/json": { schema: { type: "object", properties: { payment_method: { type: "string", enum: ["cash","card","bank_transfer"] } } } } } }, responses: { "200": { description: "OK" } } } },
    "/invoices/{id}/pdf": { get: { tags: ["Fakture"], summary: "PDF fakture", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "PDF", content: { "application/pdf": { schema: { type: "string", format: "binary" } } } } } } },
    "/reports/revenue": { get: { tags: ["Izvještaji"], summary: "Izvještaj prihoda", parameters: [{ name: "from", in: "query", schema: { type: "string", format: "date" } }, { name: "to", in: "query", schema: { type: "string", format: "date" } }], responses: { "200": { description: "Prihodi" } } } },
    "/reports/appointments": { get: { tags: ["Izvještaji"], summary: "Izvještaj termina", responses: { "200": { description: "Statistike" } } } },
    "/reports/doctors": { get: { tags: ["Izvještaji"], summary: "Izvještaj doktora", responses: { "200": { description: "Statistike" } } } },
    "/reports/revenue/export": { get: { tags: ["Izvještaji"], summary: "CSV izvoz prihoda", responses: { "200": { description: "CSV datoteka", content: { "text/csv": { schema: { type: "string" } } } } } } },
    "/lab-results": { get: { tags: ["Laboratorij"], summary: "Lista laboratorijskih nalaza", responses: { "200": { description: "Lista" } } }, post: { tags: ["Laboratorij"], summary: "Kreiranje nalaza", requestBody: { content: { "application/json": { schema: { type: "object", required: ["appointment_id","test_name"], properties: { appointment_id: { type: "integer" }, test_name: { type: "string", example: "Kompletna krvna slika" }, results: { type: "object" }, reference_range: { type: "string" }, is_abnormal: { type: "boolean" } } } } } }, responses: { "201": { description: "Kreiran" } } } },
    "/documents": { get: { tags: ["Dokumenti"], summary: "Lista dokumenata", responses: { "200": { description: "Lista" } } }, post: { tags: ["Dokumenti"], summary: "Upload dokumenta", requestBody: { content: { "multipart/form-data": { schema: { type: "object", properties: { file: { type: "string", format: "binary" }, patient_id: { type: "integer" }, type: { type: "string", enum: ["referral","consent","insurance","other"] } } } } } }, responses: { "201": { description: "Uploadano" } } } },
    "/reminders": { get: { tags: ["Podsjetnici"], summary: "Lista podsjetnika", responses: { "200": { description: "Lista" } } }, post: { tags: ["Podsjetnici"], summary: "Kreiranje podsjetnika", requestBody: { content: { "application/json": { schema: { type: "object", required: ["patient_id","message","remind_at"], properties: { patient_id: { type: "integer" }, message: { type: "string" }, remind_at: { type: "string", format: "date-time" } } } } } }, responses: { "201": { description: "Kreiran" } } } },
    "/users": { get: { tags: ["Korisnici"], summary: "Lista korisnika klinike", responses: { "200": { description: "Lista" } } }, post: { tags: ["Korisnici"], summary: "Kreiranje korisnika", requestBody: { content: { "application/json": { schema: { type: "object", required: ["first_name","last_name","email","password","role"], properties: { first_name: { type: "string" }, last_name: { type: "string" }, email: { type: "string" }, password: { type: "string" }, role: { type: "string", enum: ["admin","doctor","receptionist","nurse"] } } } } } }, responses: { "201": { description: "Kreiran" } } } },
    "/users/{id}": { get: { tags: ["Korisnici"], summary: "Detalji korisnika", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "OK" } } }, put: { tags: ["Korisnici"], summary: "Ažuriranje", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "OK" } } }, delete: { tags: ["Korisnici"], summary: "Brisanje", parameters: [{ name: "id", in: "path", required: true, schema: { type: "integer" } }], responses: { "200": { description: "OK" } } } },
    "/clinic": { get: { tags: ["Klinika"], summary: "Podaci o klinici", responses: { "200": { description: "Klinika" } } }, put: { tags: ["Klinika"], summary: "Ažuriranje podataka", responses: { "200": { description: "OK" } } } },
    "/audit-log": { get: { tags: ["Audit"], summary: "Audit log aktivnosti", parameters: [{ name: "filter[subject_type]", in: "query", schema: { type: "string" } }, { name: "filter[causer_id]", in: "query", schema: { type: "integer" } }], responses: { "200": { description: "Log zapisi" } } } },
    "/2fa/setup": { post: { tags: ["2FA"], summary: "Postavljanje 2FA", responses: { "200": { description: "QR kod" } } } },
    "/2fa/verify": { post: { tags: ["2FA"], summary: "Verifikacija TOTP koda", requestBody: { content: { "application/json": { schema: { type: "object", properties: { code: { type: "string", example: "123456" } } } } } }, responses: { "200": { description: "OK" } } } },
    "/2fa/disable": { post: { tags: ["2FA"], summary: "Deaktivacija 2FA", responses: { "200": { description: "OK" } } } }
  }
};
SwaggerUIBundle({
  spec: spec,
  dom_id: "#swagger-ui",
  deepLinking: true,
  presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
  layout: "BaseLayout",
  tryItOutEnabled: true,
  requestInterceptor: (req) => {
    const token = localStorage.getItem("cf_token");
    if (token) req.headers["Authorization"] = "Bearer " + token;
    return req;
  }
});
</script>
</body>
</html>
